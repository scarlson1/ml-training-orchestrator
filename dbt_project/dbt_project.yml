name: bmo
version: '1.0.0'
config-version: 2
profile: bmo

model-paths: ['models']
test-paths: ['tests']
seed-paths: ['seeds']
macro-paths: ['macros']
target-path: 'target'
clean-targets: [target, dbt_packages]

models:
  bmo:
    staging:
      +materialized: ephemeral # inlined into downstream SQL; no database object needed, so feature models build correctly when selected in isolation
    intermediate:
      +materialized: ephemeral # same reasoning as staging; only mart_training_dataset depends on it
    features:
      +materialized: table # computed once and stored; window functions = expensive ==> don't want to recompute window fns over millions of rows every time training code queries a feature
    marts:
      +materialized: table # final training dataset - queried by training job
