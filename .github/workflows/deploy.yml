name: Deploy

on:
  workflow_run:
    workflows: ['Build & Push Docker Images']
    types: [completed]
    branches: [main]

jobs:
  deploy-control-plane:
    name: Deploy control plane → Oracle VM
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ORACLE_VM_IP }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_PRIVATE_KEY }}
          # The script runs on the Oracle VM.
          # It pulls the new images (already pushed to GHCR by the build job),
          # then does a rolling restart — Postgres/Redis stay up, only Dagster
          # and MLflow are cycled.
          script: |
            set -euo pipefail
            cd ~/ml-training-orchestrator

            # Pull latest code (env files are gitignored; they stay on the VM)
            git pull --ff-only origin main

            # Log in to GHCR so docker can pull the private images
            echo "${{ secrets.GITHUB_TOKEN }}" \
              | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull new image versions (fast — layers are cached on the VM)
            docker compose \
              -f infra/compose/docker-compose.prod.yml \
              --env-file .env \
              pull dagster mlflow

            # Restart only the updated services; --no-deps skips dependency restarts
            docker compose \
              -f infra/compose/docker-compose.prod.yml \
              --env-file .env \
              up -d --no-deps dagster mlflow

            # Verify Dagster is healthy before marking the deploy done
            for i in $(seq 1 12); do
              if curl -sf http://localhost:3000/server_info > /dev/null; then
                echo "Dagster healthy after ${i}x5s"
                break
              fi
              echo "Waiting for Dagster... (${i}/12)"
              sleep 5
            done
            curl -sf http://localhost:3000/server_info || (echo "Dagster failed to start" && exit 1)

  deploy-serving:
    name: Deploy serving API → Fly.io
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    # Runs in parallel with control-plane deploy — independent targets

    steps:
      - uses: actions/checkout@v4

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: fly deploy --config fly.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        # --remote-only: Fly builds the image on their infrastructure,
        # not in this GitHub Actions runner. This avoids a ~300MB Docker
        # push from the runner and is faster overall.
