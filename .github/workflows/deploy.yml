name: Deploy

on:
  workflow_run:
    workflows: ['Build & Push Docker Images']
    types: [completed]
    branches: [main]
  # Allow manual trigger — required for first deploy and re-deploys without a code change
  workflow_dispatch:

jobs:
  deploy-control-plane:
    name: Deploy control plane → Oracle VM
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4

      - name: Write .env and deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.ORACLE_VM_IP }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            # Clone on first deploy; pull on all subsequent ones
            if [ ! -d ~/ml-training-orchestrator ]; then
              git clone https://github.com/${{ github.repository }}.git ~/ml-training-orchestrator
            fi
            cd ~/ml-training-orchestrator
            git pull --ff-only origin main

            # Write .env from GitHub secrets and variables.
            # GitHub Actions resolves expressions before sending this script over SSH,
            # so by the time bash sees it the values are already literal strings.
            # Single-quoted heredoc (<<'EOF') prevents bash from re-interpreting any $ in those values.
            cat > .env << 'EOF'
            # Object store — Cloudflare R2
            AWS_ACCESS_KEY_ID=${{ secrets.S3_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.S3_SECRET_ACCESS_KEY }}
            AWS_ENDPOINT_URL=https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
            S3_ENDPOINT_URL=https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
            AWS_DEFAULT_REGION=auto
            AWS_REGION=auto
            CLOUDFLARE_ACCOUNT_ID=${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
            S3_ACCESS_KEY_ID=${{ secrets.S3_ACCESS_KEY_ID }}
            S3_SECRET_ACCESS_KEY=${{ secrets.S3_SECRET_ACCESS_KEY }}

            # Feast registry — S3 path shared between Dagster (writes) and serving (reads)
            FEAST_REGISTRY_PATH=s3://staging/feast/registry.db

            # Buckets (match Terraform-created names)
            S3_BUCKET_RAW=raw
            S3_BUCKET_STAGING=staging
            S3_BUCKET_REJECTED=rejected
            FEAST_S3_BASE=s3://staging/feast
            DATASET_S3_BASE=s3://staging/datasets

            # Feast online store (Upstash — external, reachable from Fly.io too)
            REDIS_URL=${{ secrets.UPSTASH_REDIS_URL }}

            # Postgres — uses docker service name, not localhost
            POSTGRES_HOST=postgres
            POSTGRES_PORT=5432
            POSTGRES_DB=${{ vars.POSTGRES_DB }}
            POSTGRES_USER=${{ vars.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            ICEBERG_CATALOG_URI=postgresql+psycopg2://${{ vars.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/iceberg

            # MLflow — uses docker service name
            MLFLOW_TRACKING_URI=http://mlflow:5000
            # VM public IP — used by MLflow --allowed-hosts so browser access works
            ORACLE_VM_IP=${{ vars.ORACLE_VM_IP }}
            MLFLOW_HASHED_PASSWORD='${{ secrets.MLFLOW_HASHED_PASSWORD }}'

            # DuckDB scratch path (ephemeral inside container)
            DUCKDB_PATH=/tmp/bmo_features.duckdb
            DUCKDB_S3_ENDPOINT=${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com

            # Serving API
            ADMIN_TOKEN=${{ secrets.ADMIN_TOKEN }}
            MODEL_NAME=bmo_flight_delay
            FEATURE_REPO_DIR=feature_repo/

            # Dagster
            DAGSTER_HOME=/dagster_home

            # Serving image — GHCR_OWNER is your GitHub username (github.com/<owner>)
            GHCR_OWNER=${{ github.repository_owner }}

            # Caddy TLS — domain Caddy obtains a Let's Encrypt cert for [VM_IP].sslip.io
            SERVING_DOMAIN=${{ vars.SERVING_DOMAIN }}
            CADDY_EMAIL=${{ vars.CADDY_EMAIL }}
            EOF
            chmod 600 .env

            # On first provision, cloud-init may still be installing Docker.
            # Wait up to 5 minutes before giving up.
            if ! command -v docker &> /dev/null; then
              echo "Docker not found — waiting for cloud-init to finish..."
              sudo cloud-init status --wait
            fi

            # Authenticate with GHCR to pull private images.
            # sudo is required: the ubuntu user's docker group membership is only
            # active in login shells; appleboy/ssh-action opens a non-login session.
            echo "${{ secrets.GITHUB_TOKEN }}" \
              | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Start on first deploy; rolling restart on subsequent ones
            if sudo systemctl is-active --quiet bmo-compose; then
              sudo systemctl restart bmo-compose
            else
              sudo systemctl start bmo-compose
            fi

            # Poll until Dagster responds (up to 3m)
            for i in $(seq 1 36); do
              if curl -sf http://localhost:3000/server_info > /dev/null; then
                echo "Dagster healthy after $((i * 5))s"
                exit 0
              fi
              echo "Waiting for Dagster... (${i}/36)"
              sleep 5
            done
            echo "Dagster failed to become healthy" && exit 1

