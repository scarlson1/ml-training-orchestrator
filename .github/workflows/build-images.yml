name: Build & Push Docker Images

on:
  push:
    branches: [main]
    paths:
      # Only rebuild when something that affects the image changes
      - 'src/**'
      - 'dagster_project/**'
      - 'dbt_project/**'
      - 'feature_repo/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'infra/docker/**'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # required to push to GHCR

    strategy:
      matrix:
        include:
          - name: dagster
            file: infra/docker/dagster.Dockerfile
          - name: serving
            file: infra/docker/serving.Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # auto-provided, no setup needed

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        # Buildx enables layer caching via --cache-from/--cache-to,
        # which makes rebuilds ~5x faster when only source code changed.

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          push: true
          platforms: linux/amd64,linux/arm64
          # Tag with both the git SHA (immutable, for rollbacks) and 'latest'
          tags: |
            ${{ env.IMAGE_PREFIX }}/bmo-${{ matrix.name }}:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/bmo-${{ matrix.name }}:latest
          # Registry-backed layer cache: only re-runs changed layers
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}/bmo-${{ matrix.name }}:cache
          cache-to: type=registry,ref=${{ env.IMAGE_PREFIX }}/bmo-${{ matrix.name }}:cache,mode=max
          # Embed the git SHA as a label — visible in `docker inspect`
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
