name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --group dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy src dagster_project

  test:
    runs-on: ubuntu-latest
    env:
      DAGSTER_HOME: /tmp/dagster_home
      S3_ENDPOINT_URL: http://localhost:9000
      AWS_ACCESS_KEY_ID: ci-test
      AWS_SECRET_ACCESS_KEY: ci-test
      AWS_ENDPOINT_URL: http://localhost:9000
      MLFLOW_TRACKING_URI: http://localhost:5000
      POSTGRES_HOST: localhost
      POSTGRES_PORT: '5432'
      POSTGRES_DB: testdb
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Sync dependencies
        run: uv sync --group dev --group training --group serving
      - name: Test
        run: uv run pytest tests/unit -q

  feast-apply:
    name: feast apply (idempotency check)
    runs-on: ubuntu-latest
    needs: [lint] # run after lint passes, no need to wait for tests

    # feast apply must succeed on a clean checkout. This proves the feature repo is self-contained and doesn't depend on local state.

    env:
      # Use a temp in-memory registry for CI — no Redis or MinIO needed for apply
      FEAST_S3_BASE: file:///tmp/feast_ci
      REDIS_URL: redis://localhost:6379
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_ENDPOINT_URL: http://localhost:9000

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install feast deps
        run: uv sync --frozen --no-dev --group feast

      - name: feast apply
        run: |
          cd feature_repo
          uv run feast apply

      - name: Verify registry has expected objects
        run: |
          cd feature_repo
          uv run python -c "
          from feast import FeatureStore
          store = FeatureStore(repo_path='.')
          fvs = {fv.name for fv in store.list_feature_views()}
          expected = {
              'origin_airport_features', 'dest_airport_features',
              'carrier_features', 'route_features', 'aircraft_features',
          }
          missing = expected - fvs
          assert not missing, f'Missing feature views: {missing}'
          print(f'OK: {len(fvs)} feature views registered')
          "
