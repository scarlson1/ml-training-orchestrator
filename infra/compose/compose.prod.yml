# Production control-plane stack for Oracle Cloud ARM VM.
# Run with: docker compose -f infra/compose/compose.prod.yml --env-file .env up -d

services:
  postgres:
    image: postgres:17
    container_name: postgres
    restart: unless-stopped
    mem_limit: 512m
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      # Bind to loopback only — Postgres should never be publicly reachable.
      # Dagster and MLflow connect via the Docker network name "postgres".
      - '127.0.0.1:5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../infra/postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ../../scripts/create_monitoring_tables.sql:/docker-entrypoint-initdb.d/02_monitoring.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 3s
      retries: 10

  # use upstash instead
  # redis:
  #   image: redis:7-alpine
  #   container_name: orchestration_redis
  #   restart: unless-stopped
  #   mem_limit: 512m
  #   ports:
  #     # Same pattern: loopback-only. Online store reads come from Fly.io (Upstash),
  #     # not from this Redis — this one is only for local Feast dev/testing.
  #     - '127.0.0.1:6379:6379'
  #   volumes:
  #     - redis_data:/data
  #   command: redis-server --appendonly yes
  #   healthcheck:
  #     test: ['CMD', 'redis-cli', 'ping']
  #     interval: 10s
  #     timeout: 3s
  #     retries: 5

  mlflow:
    build:
      context: ../../infra/docker/mlflow
      dockerfile: Dockerfile
    container_name: ml_flow
    restart: unless-stopped
    mem_limit: 512m
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # R2 as artifact store — same S3 SDK, different endpoint
      MLFLOW_S3_ENDPOINT_URL: ${AWS_ENDPOINT_URL}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    command: >
      mlflow server
      --backend-store-uri postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      --artifacts-destination s3://bmo-mlflow-artifacts/
      --host 0.0.0.0
      --allowed-hosts "mlflow,mlflow:5000,localhost,localhost:5000,127.0.0.1,${ORACLE_VM_IP},${ORACLE_VM_IP}:5000"
    ports:
      # Public-facing: Fly.io serving API reads model artifacts from MLflow
      - '0.0.0.0:5000:5000'

  dagster:
    build:
      context: ../..
      dockerfile: infra/docker/dagster.Dockerfile
    image: ghcr.io/${GHCR_OWNER}/bmo-dagster:latest
    container_name: bmo_dagster
    restart: unless-stopped
    mem_limit: 3g
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started
    env_file:
      # .env on the VM — populated with R2 creds + Upstash URL from terraform outputs
      - ../../.env
    environment:
      # Override the localhost defaults from .env with Docker service names
      POSTGRES_HOST: postgres
      MLFLOW_TRACKING_URI: http://mlflow:5000
      # R2 endpoint for DuckDB (strips the http:// scheme — DuckDB wants host:port only)
      DUCKDB_S3_ENDPOINT: ${CLOUDFLARE_ACCOUNT_ID}.r2.cloudflarestorage.com
      DAGSTER_HOME: /dagster_home
      DUCKDB_PATH: /dagster_home/bmo_features.duckdb
    volumes:
      - dagster_home:/dagster_home
    ports:
      - '0.0.0.0:3000:3000'

  serving:
    # Image built by CI and pushed to GHCR. GHCR_OWNER is your GitHub username, set in .env.
    image: ghcr.io/${GHCR_OWNER}/bmo-serving:latest
    container_name: bmo_serving
    restart: unless-stopped
    mem_limit: 512m
    depends_on:
      mlflow:
        condition: service_started
    env_file:
      - ../../.env
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      # REDIS_URL comes from .env (Upstash). Override here only if using local Redis instead.
    # No ports: block — serving is not publicly exposed. Caddy proxies to it internally
    # via the shared Docker network using the service name "serving".
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:8080/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 120s

  caddy:
    image: caddy:alpine
    container_name: bmo_caddy
    restart: unless-stopped
    mem_limit: 512m
    depends_on:
      serving:
        condition: service_healthy
    env_file:
      - ../../.env
    volumes:
      # Caddyfile config
      - ../../infra/docker/Caddyfile:/etc/caddy/Caddyfile:ro
      # Caddy persists TLS certs here — mount a named volume so certs survive restarts.
      # Without this, Caddy re-issues a cert on every container restart and hits
      # Let's Encrypt rate limits (5 duplicate certs per domain per week).
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - '0.0.0.0:80:80' # ACME HTTP-01 challenge
      - '0.0.0.0:443:443' # HTTPS

volumes:
  postgres_data:
  dagster_home:
  caddy_data: # TLS certs — must persist or Caddy re-issues on every restart (LE rate limit: 5/week)
  caddy_config: # Caddy internal config cache
